services:

  db-legal:
    image: postgres:16-alpine
    container_name: legallens-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - legallens-net

  backend-django:
    build:
      context: ./django_backend
      dockerfile: Dockerfile
    container_name: legallens-django
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./django_backend:/app
      - django_media:/app/media
      - django_static:/app/staticfiles
    expose:
      - "8000"
    ports:
      - "8010:8000"
    depends_on:
      db-legal:
        condition: service_healthy
      ai-engine:
        condition: service_started
    networks:
      - legallens-net

  ai-engine:
    build:
      context: ./fastapi_engine
      dockerfile: Dockerfile
    container_name: legallens-ai
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./fastapi_engine:/app
    expose:
      - "8001"
    ports:
      - "8011:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legallens-net

volumes:
  postgres_data:
  django_media:
  django_static:

networks:
  legallens-net:
    driver: bridge
