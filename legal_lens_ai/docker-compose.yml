services:

  # ---------------------------------------------------------------------------
  # 1) PostgreSQL - Base de datos
  # ---------------------------------------------------------------------------
  db-legal:
    image: postgres:16-alpine
    container_name: legallens-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - legallens-net

  # ---------------------------------------------------------------------------
  # 2) Django - Backend de gestion (panel, auth, admin)
  # ---------------------------------------------------------------------------
  backend-django:
    build:
      context: ./django_backend
      dockerfile: Dockerfile
    container_name: legallens-django
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./django_backend:/app
      - django_media:/app/media
      - django_static:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      db-legal:
        condition: service_healthy
      ai-engine:
        condition: service_started
    networks:
      - legallens-net

  # ---------------------------------------------------------------------------
  # 3) FastAPI - Microservicio de IA (semana 2-3)
  # ---------------------------------------------------------------------------
  ai-engine:
    build:
      context: ./fastapi_engine
      dockerfile: Dockerfile
    container_name: legallens-ai
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./fastapi_engine:/app
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legallens-net

  # ---------------------------------------------------------------------------
  # 4) Nginx - Proxy inverso (semana 4)
  # ---------------------------------------------------------------------------
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: legallens-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/static:ro
      - django_media:/media:ro
    ports:
      - "8080:80"
    depends_on:
      - backend-django
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - legallens-net

volumes:
  postgres_data:
  django_media:
  django_static:

networks:
  legallens-net:
    driver: bridge
