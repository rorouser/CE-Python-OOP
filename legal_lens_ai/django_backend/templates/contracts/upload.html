{% extends "base.html" %}
{% block title %}Subir contrato - LegalLens AI{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4">Subir nuevo contrato</h3>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger small">{{ field.errors|join:", " }}</div>{% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Subir y auditar</button>
                    <a href="{% url 'contracts:dashboard' %}" class="btn btn-link">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    document.querySelectorAll('input,select').forEach(el => el.classList.add('form-control'));
</script>
{% endblock %}
